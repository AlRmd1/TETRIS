<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Game - Kompleks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 30px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            border: 2px solid #00f0f0;
            box-shadow: 0 0 30px rgba(0, 240, 240, 0.3);
            backdrop-filter: blur(10px);
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #00f0f0;
            text-shadow: 0 0 10px rgba(0, 240, 240, 0.5);
            margin-bottom: 10px;
        }

        .game-board {
            position: relative;
            width: 300px;
            height: 500px;
            background: #0d0d0d;
            border: 3px solid #00f0f0;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 240, 240, 0.5), inset 0 0 20px rgba(0,0,0,0.8);
        }

        .game-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(20, 1fr);
            gap: 0;
            padding: 0;
        }

        .grid-cell {
            background: #1a1a1a;
            border: 0.5px solid rgba(0, 240, 240, 0.1);
            position: relative;
        }

        .grid-cell.filled {
            border: 0.5px solid rgba(255, 255, 255, 0.2);
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            background: rgba(0, 240, 240, 0.2);
            border: 2px solid #00f0f0;
            border-radius: 8px;
            color: #00f0f0;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: rgba(0, 240, 240, 0.4);
            box-shadow: 0 0 15px rgba(0, 240, 240, 0.6);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 0 10px rgba(0, 240, 240, 0.3);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 220px;
        }

        .info-card {
            background: rgba(0, 240, 240, 0.1);
            border: 2px solid rgba(0, 240, 240, 0.3);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .info-label {
            font-size: 11px;
            color: rgba(0, 240, 240, 0.7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .info-value {
            font-size: 36px;
            font-weight: 700;
            color: #00f0f0;
            text-shadow: 0 0 10px rgba(0, 240, 240, 0.5);
        }

        .next-piece {
            background: rgba(0, 240, 240, 0.1);
            border: 2px solid rgba(0, 240, 240, 0.3);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .next-piece-label {
            font-size: 11px;
            color: rgba(0, 240, 240, 0.7);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-bottom: 0;
        }

        .preview-cell {
            width: 100%;
            aspect-ratio: 1;
            background: #1a1a1a;
            border: 1px solid rgba(0, 240, 240, 0.2);
            border-radius: 4px;
        }

        .stats {
            background: rgba(0, 240, 240, 0.1);
            border: 2px solid rgba(0, 240, 240, 0.3);
            border-radius: 10px;
            padding: 20px;
            font-size: 13px;
            backdrop-filter: blur(5px);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 240, 240, 0.2);
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: rgba(0, 240, 240, 0.6);
            font-weight: 500;
        }

        .stat-value {
            font-weight: 700;
            color: #00f0f0;
        }

        .keyboard-hint {
            font-size: 11px;
            color: rgba(0, 240, 240, 0.6);
            text-align: center;
            padding: 15px;
            background: rgba(0, 240, 240, 0.1);
            border: 1px solid rgba(0, 240, 240, 0.2);
            border-radius: 8px;
            line-height: 1.6;
            margin-top: 10px;
        }

        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .game-over-modal.show {
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #00f0f0;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            min-width: 350px;
            box-shadow: 0 0 40px rgba(0, 240, 240, 0.5);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            font-size: 36px;
            margin-bottom: 15px;
            color: #00f0f0;
            text-shadow: 0 0 10px rgba(0, 240, 240, 0.5);
        }

        .modal-content p {
            font-size: 16px;
            color: rgba(0, 240, 240, 0.7);
            margin-bottom: 25px;
        }

        .modal-score {
            font-size: 48px;
            font-weight: 700;
            color: #00f0f0;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(0, 240, 240, 0.6);
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-buttons button {
            flex: 1;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
                gap: 20px;
            }

            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
                min-width: auto;
            }

            .info-card {
                flex: 1;
                min-width: 140px;
            }
        }

        .pulse {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 0 10px rgba(0, 240, 240, 0.5);
            }
            50% {
                text-shadow: 0 0 20px rgba(0, 240, 240, 0.8);
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="game-area">
                <div class="game-title">TETRIS</div>
                <div class="game-board">
                    <div class="game-grid" id="gameGrid"></div>
                </div>
                <div class="controls">
                    <button id="leftBtn" title="Tekan A atau Panah Kiri">← KIRI</button>
                    <button id="rotateBtn" title="Tekan W atau Panah Atas">🔄 PUTAR</button>
                    <button id="downBtn" title="Tekan S atau Panah Bawah">↓ BAWAH</button>
                    <button id="rightBtn" title="Tekan D atau Panah Kanan">KANAN →</button>
                </div>
                <div class="controls">
                    <button id="hardDropBtn" title="Tekan Space">⬇️ HARD DROP</button>
                    <button id="pauseBtn">⏸ PAUSE</button>
                    <button id="playBtn">▶️ MAIN</button>
                </div>
                <div class="keyboard-hint">
                    ⌨️ A/D atau ← → Gerak | W atau ↑ Putar | S atau ↓ Drop<br>
                    SPACE Hard Drop | P Pause/Resume
                </div>
            </div>

            <div class="sidebar">
                <div class="info-card">
                    <div class="info-label">Skor</div>
                    <div class="info-value" id="score">0</div>
                </div>

                <div class="info-card">
                    <div class="info-label">Level</div>
                    <div class="info-value" id="level">1</div>
                </div>

                <div class="info-card">
                    <div class="info-label">Baris Dihapus</div>
                    <div class="info-value" id="lines">0</div>
                </div>

                <div class="next-piece">
                    <div class="next-piece-label">PIECE BERIKUTNYA</div>
                    <div class="preview-grid" id="previewGrid"></div>
                </div>

                <div class="stats">
                    <div class="stat-row">
                        <span class="stat-label">Kecepatan</span>
                        <span class="stat-value" id="speed">Normal</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Status</span>
                        <span class="stat-value" id="status">Siap</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">High Score</span>
                        <span class="stat-value" id="highScore">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="game-over-modal" id="gameOverModal">
        <div class="modal-content">
            <h2>GAME OVER!</h2>
            <p>Permainan telah berakhir</p>
            <div class="modal-score" id="finalScore">0</div>
            <div class="modal-buttons">
                <button id="restartBtn">Mulai Ulang</button>
                <button id="closeBtn">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        // ===== KONFIGURASI GAME =====
        const ROWS = 20;
        const COLS = 10;
        const BLOCK_SIZE = 30;

        // Definisi Tetromino
        const TETROMINOS = {
            I: { 
                shape: [[1,1,1,1]], 
                color: '#00f0f0',
                name: 'I'
            },
            O: { 
                shape: [[1,1],[1,1]], 
                color: '#f0f000',
                name: 'O'
            },
            T: { 
                shape: [[0,1,0],[1,1,1]], 
                color: '#a000f0',
                name: 'T'
            },
            S: { 
                shape: [[0,1,1],[1,1,0]], 
                color: '#00f000',
                name: 'S'
            },
            Z: { 
                shape: [[1,1,0],[0,1,1]], 
                color: '#f00000',
                name: 'Z'
            },
            J: { 
                shape: [[1,0,0],[1,1,1]], 
                color: '#0000f0',
                name: 'J'
            },
            L: { 
                shape: [[0,0,1],[1,1,1]], 
                color: '#f0a000',
                name: 'L'
            }
        };

        const keys = Object.keys(TETROMINOS);

        // ===== STATE GAME =====
        let board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        let score = 0;
        let lines = 0;
        let level = 1;
        let gameRunning = false;
        let gamePaused = false;
        let highScore = parseInt(localStorage.getItem('tetrisHighScore')) || 0;
        let dropSpeed = 800;

        let currentPiece = null;
        let nextPiece = null;
        let pieceX = 0;
        let pieceY = 0;
        let dropInterval = null;

        // ===== FUNGSI UTILITAS =====
        function getRandomPiece() {
            const key = keys[Math.floor(Math.random() * keys.length)];
            return {
                shape: JSON.parse(JSON.stringify(TETROMINOS[key].shape)),
                color: TETROMINOS[key].color,
                name: TETROMINOS[key].name
            };
        }

        function initGame() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
            score = 0;
            lines = 0;
            level = 1;
            dropSpeed = 800;
            gameRunning = true;
            gamePaused = false;

            currentPiece = getRandomPiece();
            nextPiece = getRandomPiece();
            pieceX = 3;
            pieceY = 0;

            updateDisplay();
            renderGame();
            startGameLoop();
        }

        function startGameLoop() {
            if (dropInterval) clearInterval(dropInterval);
            dropInterval = setInterval(() => {
                if (!gamePaused && gameRunning) {
                    movePieceDown();
                }
            }, dropSpeed);
        }

        // ===== RENDERING =====
        function renderGame() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';

            // Render board
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    
                    if (board[r][c]) {
                        cell.style.background = board[r][c];
                        cell.classList.add('filled');
                    }
                    grid.appendChild(cell);
                }
            }

            // Render current piece
            if (currentPiece) {
                currentPiece.shape.forEach((row, y) => {
                    row.forEach((val, x) => {
                        if (val) {
                            const r = pieceY + y;
                            const c = pieceX + x;
                            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                                const idx = r * COLS + c;
                                const element = grid.children[idx];
                                if (element) {
                                    element.style.background = currentPiece.color;
                                    element.classList.add('filled');
                                }
                            }
                        }
                    });
                });
            }
        }

        // ===== GERAKAN PIECE =====
        function canMove(dx, dy) {
            if (!currentPiece) return false;
            
            const shape = currentPiece.shape;
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const newX = pieceX + x + dx;
                        const newY = pieceY + y + dy;
                        
                        // Cek boundary
                        if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
                        
                        // Cek tabrakan dengan block yang sudah ada
                        if (newY >= 0 && board[newY][newX]) return false;
                    }
                }
            }
            return true;
        }

        function movePieceLeft() {
            if (!gameRunning || gamePaused) return;
            if (canMove(-1, 0)) pieceX--;
            renderGame();
        }

        function movePieceRight() {
            if (!gameRunning || gamePaused) return;
            if (canMove(1, 0)) pieceX++;
            renderGame();
        }

        function movePieceDown() {
            if (!gameRunning) return;
            
            if (canMove(0, 1)) {
                pieceY++;
                renderGame();
            } else {
                placePiece();
            }
        }

        function hardDrop() {
            if (!gameRunning || gamePaused) return;
            
            while (canMove(0, 1)) {
                pieceY++;
            }
            placePiece();
        }

        function rotatePiece() {
            if (!gameRunning || gamePaused || !currentPiece) return;
            
            const original = JSON.parse(JSON.stringify(currentPiece.shape));
            
            // Rotasi 90 derajat clockwise
            const newShape = currentPiece.shape[0].map((_, colIndex) =>
                currentPiece.shape.map(row => row[colIndex]).reverse()
            );
            
            currentPiece.shape = newShape;

            // Jika tidak bisa dirotasi, kembalikan ke bentuk asli
            if (!canMove(0, 0)) {
                currentPiece.shape = original;
            }
            renderGame();
        }

        // ===== MENEMPATKAN PIECE =====
        function placePiece() {
            const shape = currentPiece.shape;
            
            // Tambahkan piece ke board
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const r = pieceY + y;
                        const c = pieceX + x;
                        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                            board[r][c] = currentPiece.color;
                        }
                    }
                }
            }

            // Cek dan hapus baris yang penuh
            clearLines();

            // Piece berikutnya
            currentPiece = nextPiece;
            nextPiece = getRandomPiece();
            pieceX = 3;
            pieceY = 0;

            // Cek apakah piece baru bisa ditempatkan
            if (!canMove(0, 0)) {
                endGame();
            } else {
                updateDisplay();
                renderGame();
            }
        }

        // ===== CLEAR LINES =====
        function clearLines() {
            let linesCleared = 0;
            
            // Cek dari bawah ke atas
            for (let r = ROWS - 1; r >= 0; r--) {
                // Cek apakah baris penuh
                if (board[r].every(cell => cell)) {
                    // Hapus baris
                    board.splice(r, 1);
                    // Tambahkan baris kosong di atas
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    r++; // Cek lagi baris yang sama
                }
            }

            // Update score
            if (linesCleared > 0) {
                lines += linesCleared;
                
                // Sistem scoring
                const pointsTable = {
                    1: 100,
                    2: 300,
                    3: 500,
                    4: 800
                };
                score += pointsTable[linesCleared] || 0;

                // Update level dan kecepatan
                level = Math.floor(lines / 10) + 1;
                dropSpeed = Math.max(100, 800 - (level - 1) * 50);

                // Restart game loop dengan kecepatan baru
                startGameLoop();
            }
        }

        // ===== UPDATE DISPLAY =====
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
            document.getElementById('highScore').textContent = highScore;
            
            const statusText = gamePaused ? 'Pause' : 'Bermain';
            document.getElementById('status').textContent = statusText;

            // Update speed text
            let speedText;
            if (level <= 3) speedText = 'Normal';
            else if (level <= 6) speedText = 'Cepat';
            else speedText = 'Sangat Cepat';
            document.getElementById('speed').textContent = speedText;

            // Update preview piece
            updatePreview();
        }

        function updatePreview() {
            const previewGrid = document.getElementById('previewGrid');
            previewGrid.innerHTML = '';
            
            const previewCells = Array(16).fill(0);
            
            if (nextPiece) {
                nextPiece.shape.forEach((row, y) => {
                    row.forEach((val, x) => {
                        if (val) {
                            const idx = y * 4 + x;
                            if (idx < 16) {
                                previewCells[idx] = nextPiece.color;
                            }
                        }
                    });
                });
            }
            
            previewCells.forEach(color => {
                const cell = document.createElement('div');
                cell.className = 'preview-cell';
                if (color) {
                    cell.style.background = color;
                }
                previewGrid.appendChild(cell);
            });
        }

        // ===== END GAME =====
        function endGame() {
            gameRunning = false;
            clearInterval(dropInterval);
            
            // Update high score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('tetrisHighScore', highScore);
            }
            
            // Tampilkan modal
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverModal').classList.add('show');
        }

        // ===== EVENT LISTENERS =====
        document.getElementById('leftBtn').addEventListener('click', movePieceLeft);
        document.getElementById('rightBtn').addEventListener('click', movePieceRight);
        document.getElementById('downBtn').addEventListener('click', movePieceDown);
        document.getElementById('rotateBtn').addEventListener('click', rotatePiece);
        document.getElementById('hardDropBtn').addEventListener('click', hardDrop);

        document.getElementById('playBtn').addEventListener('click', () => {
            if (!gameRunning) {
                initGame();
            } else {
                gamePaused = false;
                updateDisplay();
                renderGame();
                startGameLoop();
            }
        });

        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (gameRunning) {
                gamePaused = !gamePaused;
                updateDisplay();
            }
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('gameOverModal').classList.remove('show');
            initGame();
        });

        document.getElementById('closeBtn').addEventListener('click', () => {
            document.getElementById('gameOverModal').classList.remove('show');
        });

        // ===== KEYBOARD CONTROLS =====
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch(e.key.toLowerCase()) {
                case 'a':
                case 'arrowleft':
                    movePieceLeft();
                    e.preventDefault();
                    break;
                case 'd':
                case 'arrowright':
                    movePieceRight();
                    e.preventDefault();
                    break;
                case 's':
                case 'arrowdown':
                    movePieceDown();
                    e.preventDefault();
                    break;
                case 'w':
                case 'arrowup':
                    rotatePiece();
                    e.preventDefault();
                    break;
                case ' ':
                    hardDrop();
                    e.preventDefault();
                    break;
                case 'p':
                    document.getElementById('pauseBtn').click();
                    e.preventDefault();
                    break;
            }
        });

        // Initialize high score display
        document.getElementById('highScore').textContent = highScore;
    </script>
</body>
</html>
